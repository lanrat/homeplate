name: "CodeQL"

on:
  push:
    branches: [ "main" ]
    paths: [ "src/**", ".github/workflows/codeql.yml", ".github/actions/setup-platformio/**" ]
  pull_request:
    branches: [ "main" ]
    paths: [ "src/**", ".github/workflows/codeql.yml", ".github/actions/setup-platformio/**" ]
  workflow_dispatch: # allow manually calling the action

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: cpp

    - name: Set up PlatformIO
      uses: ./.github/actions/setup-platformio

    - name: Run PlatformIO
      # single env is sufficient for analysis
      run: pio run -e inkplate10

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:cpp"
