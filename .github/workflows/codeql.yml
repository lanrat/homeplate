name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  workflow_dispatch: # allow manually calling the action
  # schedule:
  #   - cron: '16 11 * * 2'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: cpp

    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install PlatformIO
      run: pip install platformio==6.1.19
    - name: Install PlatformIO Libs
      run: pio pkg install
    - name: Use example config
      run: cp src/config_example.h src/config.h
    # - name: PlatformIO static check
    #   # empty target to prevent upload
    #   run: pio check

    - name: Run PlatformIO
      # empty target to prevent upload
      run: pio run -t ''

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:cpp"
