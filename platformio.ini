[platformio]
; default_envs lists the board environments built when `pio run` is invoked
; without `-e`. Special-purpose envs (ota, debug, vcom, waveform_eeprom, native)
; are intentionally excluded — invoke them explicitly with `pio run -e <env>`.
; See developing.md for the list of supported board environments.
default_envs =
  inkplate5
  inkplate5v2
  inkplate10
  inkplate10v2
  inkplate6
  inkplate6v2
  inkplate6plus
  inkplate6plusv2
  inkplate6flick
; set the below to add an "include" dir to the build path
; include_dir =

[user]
; Board-specific build flags for the special-purpose envs (debug, ota,
; vcom, waveform_eeprom). Set both to match your hardware. The default
; board envs ([env:inkplate5], [env:inkplate10], etc.) are unaffected.
;
; board_flag values:
;   inkplate5       -> -DARDUINO_INKPLATE5
;   inkplate5v2     -> -DARDUINO_INKPLATE5V2
;   inkplate6       -> (leave empty; uses ARDUINO_ESP32_DEV instead)
;   inkplate6v2     -> -DARDUINO_INKPLATE6V2
;   inkplate6plus   -> -DARDUINO_INKPLATE6PLUS
;   inkplate6plusv2 -> -DARDUINO_INKPLATE6PLUSV2
;   inkplate6flick  -> -DARDUINO_INKPLATE6FLICK
;   inkplate10      -> -DARDUINO_INKPLATE10
;   inkplate10v2    -> -DARDUINO_INKPLATE10V2
;
; board_unflags is the default for all boards EXCEPT the original
; inkplate6, which needs ARDUINO_ESP32_DEV to remain defined. For
; inkplate6 (original) only, set: board_unflags =
board_flag = -DARDUINO_INKPLATE10
board_unflags = -DARDUINO_ESP32_DEV

[inkplate_defaults]
; default environments for inkplate devices
inkplate_lib = https://github.com/SolderedElectronics/Inkplate-Arduino-library#10.2.2
platform = espressif32 @ 6.13.0
framework = arduino
monitor_speed = 115200
board = esp32dev
; CPU Frequency. Max for ESP32: 240000000L
board_build.f_cpu = 240000000L
board_build.partitions = min_spiffs.csv ; use SD card for storage and use the rest of flash for larger apps

; Until there is a specific Inkplate10 board definition we need to ensure
; ARDUINO_ESP32_DEV is not set, as it will be always prioritized by the library
; thinking it is an Inkplate 6 (which still has this board name for BC reasons).
build_unflags =
  -DARDUINO_ESP32_DEV

lib_deps =
  ; LIB @ [^]VERSION ('^' means latest version with same major version number)
  ; 1.2.3 - an exact version number. Use only this exact version
  ; ^1.2.3 - any compatible version (exact version for 1.x.x versions)
  ; ~1.2.3 - any version with the same major and minor versions, and an equal or greater patch version
  ; >1.2.3 - any version greater than 1.2.3. >=, <, and <= are also possible
  ; >0.1.0,!=0.2.0,<0.3.0 - any version greater than 0.1.0, not equal to 0.2.0 and less than 0.3.0
  
  ${inkplate_defaults.inkplate_lib}
  arduino-libraries/NTPClient @ 3.2.1 ; NTP client
  fbiego/ESP32Time @ 2.0.6 ; for syncing RTC to internal clock
  ricmoo/QRCode @ 0.0.1 ; for QR code
  marvinroger/AsyncMqttClient @ 0.9.0 ; FOR MQTT
  bblanchon/ArduinoJson @ 7.4.3 ; for JSON
  https://github.com/tzapu/WiFiManager.git#v2.0.17 ; WiFi config portal

monitor_filters = time, esp32_exception_decoder, default

build_flags =
  !echo '-DVERSION=\"'$(git describe --tags --always --dirty 2>/dev/null | sed 's/^v//')'\"'
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -DCONFIG_FREERTOS_CHECK_STACKOVERFLOW_PTRVAL
    ; sets configCHECK_FOR_STACK_OVERFLOW = 1, helps detect stack overflows

[env:inkplate5]
; settings for inkplate5
extends = inkplate_defaults
build_flags =
  ${inkplate_defaults.build_flags}
  -DARDUINO_INKPLATE5

[env:inkplate5v2]
; settings for inkplate5v2
extends = inkplate_defaults
build_flags =
  ${inkplate_defaults.build_flags}
  -DARDUINO_INKPLATE5V2

[env:inkplate10]
; settings for inkplate10
extends = inkplate_defaults
build_flags =
  ${inkplate_defaults.build_flags}
  -DARDUINO_INKPLATE10

[env:inkplate10v2]
; settings for inkplate10v2
extends = inkplate_defaults
build_flags =
  ${inkplate_defaults.build_flags}
  -DARDUINO_INKPLATE10V2

[env:inkplate6]
; settings for inkplate6 (original)
extends = inkplate_defaults
; Inkplate 6 uses ARDUINO_ESP32_DEV — do NOT unflag it
build_unflags =
build_flags =
  ${inkplate_defaults.build_flags}

[env:inkplate6v2]
; settings for inkplate6v2
extends = inkplate_defaults
build_flags =
  ${inkplate_defaults.build_flags}
  -DARDUINO_INKPLATE6V2

[env:inkplate6plus]
; settings for inkplate6plus
extends = inkplate_defaults
build_flags =
  ${inkplate_defaults.build_flags}
  -DARDUINO_INKPLATE6PLUS

[env:inkplate6plusv2]
; settings for inkplate6plusv2
extends = inkplate_defaults
build_flags =
  ${inkplate_defaults.build_flags}
  -DARDUINO_INKPLATE6PLUSV2

[env:inkplate6flick]
; settings for inkplate6flick
extends = inkplate_defaults
build_flags =
  ${inkplate_defaults.build_flags}
  -DARDUINO_INKPLATE6FLICK

[env:debug]
extends = inkplate_defaults
build_type = debug
build_unflags = ${user.board_unflags}
build_flags =
  ${inkplate_defaults.build_flags}
  ${user.board_flag}
  -DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_DEBUG
    ; debug levels:
    ; ARDUHAL_LOG_LEVEL_NONE
    ; ARDUHAL_LOG_LEVEL_ERROR
    ; ARDUHAL_LOG_LEVEL_WARN  *default*
    ; ARDUHAL_LOG_LEVEL_INFO
    ; ARDUHAL_LOG_LEVEL_DEBUG
    ; ARDUHAL_LOG_LEVEL_VERBOSE


[env:ota]
extends = inkplate_defaults
targets = upload
build_unflags = ${user.board_unflags}
build_flags =
  ${inkplate_defaults.build_flags}
  ${user.board_flag}
; host machine must be reachable from ESP
upload_port = homeplate.local ; change this to your device's name/IP
upload_protocol = espota
upload_flags =
  --host_port=8266 ; this port must be allowed through the firewall from the ESP to this computer


[env:vcom]
extends = inkplate_defaults
build_unflags = ${user.board_unflags}
build_flags =
  ${inkplate_defaults.build_flags}
  ${user.board_flag}
lib_deps =
  ${inkplate_defaults.inkplate_lib}
build_src_filter= -<*> +<../src_vcom/>


[env:waveform_eeprom]
extends = inkplate_defaults
build_unflags = ${user.board_unflags}
build_flags =
  ${inkplate_defaults.build_flags}
  ${user.board_flag}
lib_deps =
  ${inkplate_defaults.inkplate_lib}
build_src_filter= -<*> +<../src_eeprom/>

[env:native]
platform = native
build_flags = -std=gnu++11
lib_deps =
  ArduinoFake
